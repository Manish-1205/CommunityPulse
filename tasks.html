<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>My Tasks - Volunteer Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#6e66d4",
                        "primary": "#00694c",
                        "primary-fixed": "#86f8c9",
                        "secondary-fixed": "#d4e3ff",
                        "on-primary-fixed": "#002115",
                        "on-primary-container": "#f5fff7",
                        "surface-container-highest": "#dee4de",
                        "error": "#ba1a1a",
                        "outline-variant": "#bccac1",
                        "background": "#f5fbf5",
                        "on-secondary-fixed-variant": "#004883",
                        "tertiary-fixed": "#e3dfff",
                        "tertiary": "#554cb9",
                        "primary-fixed-dim": "#68dbae",
                        "on-tertiary-container": "#fffbff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#7ab3ff",
                        "on-tertiary-fixed-variant": "#3f35a3",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eaefea",
                        "surface": "#f5fbf5",
                        "secondary-fixed-dim": "#a4c9ff",
                        "surface-dim": "#d6dbd6",
                        "outline": "#6d7a73",
                        "surface-container-low": "#eff5ef",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#001c39",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#00447e",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#00513a",
                        "on-background": "#171d1a",
                        "secondary": "#1960a6",
                        "on-surface": "#171d1a",
                        "inverse-surface": "#2c322e",
                        "inverse-primary": "#68dbae",
                        "surface-variant": "#dee4de",
                        "surface-bright": "#f5fbf5",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#c5c0ff",
                        "surface-tint": "#006c4e",
                        "primary-container": "#008560",
                        "on-tertiary-fixed": "#140067",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e4eae4",
                        "on-surface-variant": "#3d4943",
                        "inverse-on-surface": "#ecf2ed"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-surface font-body selection:bg-primary-fixed">
    <!-- TopAppBar -->
    <nav
        class="fixed top-0 w-full z-50 bg-emerald-50/70 dark:bg-slate-950/70 backdrop-blur-2xl transition-all duration-300">
        <div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-emerald-900 dark:text-emerald-400">volunteer_activism</span>
                <h1 class="text-xl font-extrabold tracking-tighter text-emerald-950 dark:text-white"
                    data-i18n="my_tasks">My Tasks</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="notifications.html"
                    class="relative p-2 rounded-full hover:bg-emerald-100/50 dark:hover:bg-emerald-800/50 transition-colors active:scale-95 duration-200">
                    <span class="material-symbols-outlined text-on-surface">notifications</span>
                    <span
                        class="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-error text-[10px] font-bold text-white">2</span>
                </a>
                <div class="hidden md:flex gap-6 items-center">
                    <a class="text-emerald-800/70 dark:text-emerald-400/70 font-sans label-md uppercase tracking-widest font-semibold hover:text-emerald-900 transition-all"
                        href="report.html" data-i18n="report">Report</a>
                    <a class="text-emerald-900 dark:text-emerald-100 font-bold font-sans label-md uppercase tracking-widest"
                        href="tasks.html" data-i18n="tasks">Tasks</a>
                    <a class="text-emerald-800/70 dark:text-emerald-400/70 font-sans label-md uppercase tracking-widest font-semibold hover:text-emerald-900 transition-all"
                        href="profile.html" data-i18n="profile">Profile</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="pt-20 pb-28 px-4 max-w-2xl mx-auto">
        <!-- Filter Chips -->
        <div class="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
            <button id="filter-all"
                class="filter-btn active h-[34px] px-4 flex items-center justify-center rounded-full bg-primary text-on-primary font-medium text-sm whitespace-nowrap">
                All
            </button>
            <button id="filter-pending"
                class="filter-btn h-[34px] px-4 flex items-center justify-center rounded-full border border-outline-variant text-on-surface-variant font-medium text-sm whitespace-nowrap hover:bg-surface-container-low transition-colors">
                Pending
            </button>
            <button id="filter-in-progress"
                class="filter-btn h-[34px] px-4 flex items-center justify-center rounded-full border border-outline-variant text-on-surface-variant font-medium text-sm whitespace-nowrap hover:bg-surface-container-low transition-colors">
                In Progress
            </button>
            <button id="filter-closed"
                class="filter-btn h-[34px] px-4 flex items-center justify-center rounded-full border border-outline-variant text-on-surface-variant font-medium text-sm whitespace-nowrap hover:bg-surface-container-low transition-colors">
                Closed
            </button>
        </div>
        <!-- Task List -->
        <div id="task-list" class="space-y-6">
            <!-- Populated dynamically in tasks.js -->
            <div class="text-center p-8 text-on-surface-variant">Loading tasks...</div>
        </div>
    </main>
    <!-- BottomNavBar -->
    <nav
        class="md:hidden fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-safe bg-white dark:bg-slate-900 border-t border-emerald-100/10 dark:border-white/5 shadow-[0_-4px_32px_0px_rgba(23,29,26,0.06)] z-50 rounded-t-full">
        <a href="home.html" data-nav="home.html"
            class="flex flex-col items-center justify-center text-emerald-700/50 dark:text-emerald-500/50 px-6 py-2 hover:text-emerald-900 dark:hover:text-emerald-200 transition-all active:scale-90 duration-150 ease-in-out">
            <span class="material-symbols-outlined">home</span>
            <span class="font-sans label-md uppercase tracking-widest font-semibold text-[10px] mt-1"
                data-i18n="home">Home</span>
        </a>
        <a href="report.html" data-nav="report.html"
            class="flex flex-col items-center justify-center text-emerald-700/50 dark:text-emerald-500/50 px-6 py-2 hover:text-emerald-900 dark:hover:text-emerald-200 transition-all active:scale-90 duration-150 ease-in-out">
            <span class="material-symbols-outlined">add_circle</span>
            <span class="font-sans label-md uppercase tracking-widest font-semibold text-[10px] mt-1"
                data-i18n="report">Report</span>
        </a>
        <a href="tasks.html" data-nav="tasks.html"
            class="relative flex flex-col items-center justify-center bg-emerald-100/50 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-100 px-6 py-2 rounded-xl active:scale-90 duration-150 ease-in-out">
            <span class="material-symbols-outlined fill-icon">assignment</span>
            <span class="font-sans label-md uppercase tracking-widest font-bold text-[10px] mt-1"
                data-i18n="tasks">Tasks</span>
            <span
                class="absolute top-2 right-4 flex h-4 w-4 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-white border-2 border-white">2</span>
        </a>
        <a href="profile.html" data-nav="profile.html"
            class="flex flex-col items-center justify-center text-emerald-700/50 dark:text-emerald-500/50 px-6 py-2 hover:text-emerald-900 dark:hover:text-emerald-200 transition-all active:scale-90 duration-150 ease-in-out">
            <span class="material-symbols-outlined">person</span>
            <span class="font-sans label-md uppercase tracking-widest font-semibold text-[10px] mt-1"
                data-i18n="profile">Profile</span>
        </a>
    </nav>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/tasks.js"></script>
</body>

</html>
