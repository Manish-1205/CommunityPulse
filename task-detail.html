<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Task Detail - CommunityPulse</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-variant": "#dee4de",
            "tertiary-fixed": "#e3dfff",
            "on-primary-fixed": "#002115",
            "secondary-fixed": "#d4e3ff",
            "on-tertiary-fixed-variant": "#3f35a3",
            "surface-container": "#eaefea",
            "secondary-container": "#7ab3ff",
            "surface-container-highest": "#dee4de",
            "error": "#ba1a1a",
            "primary": "#00694c",
            "outline": "#6d7a73",
            "on-tertiary-fixed": "#140067",
            "on-tertiary": "#ffffff",
            "primary-fixed-dim": "#68dbae",
            "surface-dim": "#d6dbd6",
            "on-error": "#ffffff",
            "inverse-primary": "#68dbae",
            "inverse-surface": "#2c322e",
            "on-background": "#171d1a",
            "outline-variant": "#bccac1",
            "on-primary": "#ffffff",
            "surface-container-high": "#e4eae4",
            "surface": "#f5fbf5",
            "on-tertiary-container": "#fffbff",
            "surface-bright": "#f5fbf5",
            "surface-container-lowest": "#ffffff",
            "inverse-on-surface": "#ecf2ed",
            "background": "#f5fbf5",
            "tertiary-fixed-dim": "#c5c0ff",
            "on-surface": "#171d1a",
            "on-secondary": "#ffffff",
            "primary-fixed": "#86f8c9",
            "on-secondary-fixed-variant": "#004883",
            "on-error-container": "#93000a",
            "surface-tint": "#006c4e",
            "on-primary-fixed-variant": "#00513a",
            "tertiary-container": "#6e66d4",
            "on-primary-container": "#f5fff7",
            "on-secondary-container": "#00447e",
            "on-secondary-fixed": "#001c39",
            "secondary-fixed-dim": "#a4c9ff",
            "primary-container": "#008560",
            "error-container": "#ffdad6",
            "on-surface-variant": "#3d4943",
            "secondary": "#1960a6",
            "tertiary": "#554cb9",
            "surface-container-low": "#eff5ef"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "display": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    .glass-header {
      background: rgba(239, 245, 239, 0.7);
      backdrop-filter: blur(24px);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-surface-container-low text-on-surface pb-32">
  <!-- TopAppBar -->
  <nav
    class="fixed top-0 w-full flex items-center justify-between px-6 h-16 bg-emerald-50/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-sm dark:shadow-none docked full-width z-50">
    <div class="flex items-center gap-4">
      <button
        class="hover:bg-emerald-100/50 dark:hover:bg-slate-800/50 rounded-full transition-all active:scale-90 p-2 flex items-center justify-center"
        onclick="window.history.back()">
        <span class="material-symbols-outlined text-emerald-900 dark:text-emerald-400">arrow_back</span>
      </button>
      <h1 class="font-inter tracking-tight font-bold text-lg text-emerald-900 dark:text-emerald-400">Task Detail</h1>
    </div>
    <button
      class="hover:bg-emerald-100/50 dark:hover:bg-slate-800/50 rounded-full transition-all active:scale-90 p-2 flex items-center justify-center">
      <span class="material-symbols-outlined text-emerald-900 dark:text-emerald-400">share</span>
    </button>
  </nav>
  <main class="pt-20 px-4 space-y-6 max-w-2xl mx-auto" id="task-detail-container">
    <div class="text-center p-12 text-on-surface-variant italic">Loading task details...</div>
  </main>

  <!-- BottomNavBar -->
  <nav
    class="fixed bottom-0 left-0 w-full z-50 flex justify-evenly items-center pt-3 pb-6 px-4 bg-white dark:bg-slate-950 rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.06)] dark:shadow-none">
    <a href="home.html" data-nav="home.html"
      class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-emerald-700 dark:hover:text-emerald-300 transition-all active:scale-95">
      <span class="material-symbols-outlined mb-1">home</span>
      <span class="font-inter text-[11px] uppercase tracking-widest font-bold" data-i18n="home">Home</span>
    </a>
    <a href="report.html" data-nav="report.html"
      class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-emerald-700 dark:hover:text-emerald-300 transition-all active:scale-95">
      <span class="material-symbols-outlined mb-1">add_circle</span>
      <span class="font-inter text-[11px] uppercase tracking-widest font-bold" data-i18n="report">Report</span>
    </a>
    <a href="tasks.html" data-nav="tasks.html"
      class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-200 rounded-2xl px-6 py-2 transition-all duration-300 active:scale-95">
      <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">assignment</span>
      <span class="font-inter text-[11px] uppercase tracking-widest font-bold" data-i18n="tasks">Tasks</span>
    </a>
    <a href="profile.html" data-nav="profile.html"
      class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-emerald-700 dark:hover:text-emerald-300 transition-all active:scale-95">
      <span class="material-symbols-outlined mb-1">person</span>
      <span class="font-inter text-[11px] uppercase tracking-widest font-bold" data-i18n="profile">Profile</span>
    </a>
  </nav>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/task-detail.js"></script>
</body>

</html>
