<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Field Worker: Report Submission</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed": "#002115",
                        "secondary": "#1960a6",
                        "secondary-container": "#7ab3ff",
                        "inverse-surface": "#2c322e",
                        "surface-bright": "#f5fbf5",
                        "outline-variant": "#bccac1",
                        "on-tertiary-fixed-variant": "#3f35a3",
                        "inverse-on-surface": "#ecf2ed",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#f5fff7",
                        "on-secondary-container": "#00447e",
                        "tertiary-container": "#6e66d4",
                        "primary-fixed": "#86f8c9",
                        "primary-container": "#008560",
                        "tertiary-fixed": "#e3dfff",
                        "surface-tint": "#006c4e",
                        "surface-container-highest": "#dee4de",
                        "surface-container": "#eaefea",
                        "on-secondary-fixed-variant": "#004883",
                        "tertiary-fixed-dim": "#c5c0ff",
                        "outline": "#6d7a73",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#171d1a",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#00513a",
                        "tertiary": "#554cb9",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#001c39",
                        "secondary-fixed-dim": "#a4c9ff",
                        "on-primary": "#ffffff",
                        "background": "#f5fbf5",
                        "surface-container-low": "#eff5ef",
                        "secondary-fixed": "#d4e3ff",
                        "primary-fixed-dim": "#68dbae",
                        "surface-dim": "#d6dbd6",
                        "surface-container-high": "#e4eae4",
                        "on-secondary": "#ffffff",
                        "primary": "#00694c",
                        "on-background": "#171d1a",
                        "surface": "#f5fbf5",
                        "on-error-container": "#93000a",
                        "surface-variant": "#dee4de",
                        "on-tertiary-fixed": "#140067",
                        "on-surface-variant": "#3d4943",
                        "inverse-primary": "#68dbae"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tap-highlight-none {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface antialiased pb-32">
    <!-- TopAppBar Section -->
    <header
        class="bg-stone-100/70 dark:bg-stone-900/70 backdrop-blur-md flex items-center justify-between px-6 py-4 w-full sticky top-0 z-50 shadow-sm dark:shadow-none">
        <div class="flex items-center gap-4">
            <button
                class="hover:bg-emerald-50 dark:hover:bg-emerald-900/30 transition-colors p-2 rounded-full scale-95 active:opacity-80 transition-all"
                onclick="window.history.back()">
                <span class="material-symbols-outlined text-emerald-800 dark:text-emerald-400">arrow_back</span>
            </button>
            <h1 class="font-inter font-bold tracking-tight text-lg text-emerald-800 dark:text-emerald-400">New Report
            </h1>
        </div>
        <button class="text-primary font-bold hover:bg-emerald-50 px-4 py-2 rounded-xl transition-all active:scale-95">
            Save Draft
        </button>
    </header>
    <!-- Offline Banner -->
    <div class="bg-[#FFF8E1] px-6 py-3 flex items-center gap-3">
        <span class="material-symbols-outlined text-[#EF9F27]"
            style="font-variation-settings: 'FILL' 1;">wifi_off</span>
        <p class="text-sm font-medium text-stone-700">Offline — will sync when connected</p>
    </div>
    <main class="px-4 py-6 max-w-2xl mx-auto space-y-8">
        <!-- Section 1: What did you see? -->
        <section class="space-y-4">
            <label class="block text-sm font-bold tracking-wider uppercase text-on-surface-variant">What did you
                see?</label>
            <div class="relative">
                <textarea id="report-description"
                    class="w-full h-[120px] bg-surface-variant border-none rounded-[10px] p-4 text-on-surface placeholder:text-stone-500 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all"
                    placeholder="Describe the situation in detail..."></textarea>
                <div class="absolute bottom-3 right-4 text-[10px] font-bold text-outline">0 / 500</div>
            </div>
            <!-- Media Row -->
            <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" multiple />
            <div class="flex gap-3 overflow-x-auto pb-2">
                <button id="btn-add-photo" type="button"
                    class="flex items-center gap-2 px-4 py-3 bg-surface-container-lowest rounded-full border border-outline-variant/15 hover:bg-primary-fixed/20 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-primary">photo_camera</span>
                    <span class="text-sm font-semibold">Photo</span>
                </button>
                <button id="btn-add-voice" type="button"
                    class="flex items-center gap-2 px-4 py-3 bg-surface-container-lowest rounded-full border border-outline-variant/15 hover:bg-primary-fixed/20 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-primary">mic</span>
                    <span class="text-sm font-semibold">Voice</span>
                </button>
                <button id="btn-add-scan" type="button"
                    class="flex items-center gap-2 px-4 py-3 bg-surface-container-lowest rounded-full border border-outline-variant/15 hover:bg-primary-fixed/20 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-primary">qr_code_scanner</span>
                    <span class="text-sm font-semibold">Scan survey</span>
                </button>
            </div>
            <!-- Photo Thumbnails -->
            <div class="flex gap-3 overflow-x-auto hide-scrollbar" id="photo-preview-container">
            </div>
        </section>
        <!-- Section 2: Type of need -->
        <section class="space-y-4">
            <label class="block text-sm font-bold tracking-wider uppercase text-on-surface-variant">Type of need</label>
            <div class="flex flex-wrap gap-2" id="category-buttons">
                <button
                    class="px-5 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-sm font-medium hover:bg-surface-container-high">Food</button>
                <button
                    class="px-5 py-2 rounded-full bg-[#FCEBEB] text-[#A32D2D] border border-[#A32D2D]/20 text-sm font-bold flex items-center gap-1 shadow-sm">
                    <span class="material-symbols-outlined text-[18px]"
                        style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Health
                </button>
                <button
                    class="px-5 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-sm font-medium hover:bg-surface-container-high">Shelter</button>
                <button
                    class="px-5 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-sm font-medium hover:bg-surface-container-high">Education</button>
                <button
                    class="px-5 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-sm font-medium hover:bg-surface-container-high">Safety</button>
            </div>
        </section>
        <!-- Section 3: How serious is this? -->
        <section class="space-y-4 bg-surface-container-low p-6 rounded-2xl">
            <div class="flex justify-between items-center">
                <label class="block text-sm font-bold tracking-wider uppercase text-on-surface-variant">How serious is
                    this?</label>
                <span
                    class="px-3 py-1 bg-error/10 text-error text-[10px] font-black uppercase tracking-widest rounded-full">Severe</span>
            </div>
            <div class="flex items-center justify-between px-2" id="severity-buttons">
                <button
                    class="w-10 h-10 rounded-full border border-outline text-outline font-bold flex items-center justify-center">1</button>
                <div class="h-[1px] flex-1 bg-outline-variant/30 mx-1"></div>
                <button
                    class="w-10 h-10 rounded-full border border-outline text-outline font-bold flex items-center justify-center">2</button>
                <div class="h-[1px] flex-1 bg-outline-variant/30 mx-1"></div>
                <button
                    class="w-10 h-10 rounded-full border border-outline text-outline font-bold flex items-center justify-center">3</button>
                <div class="h-[1px] flex-1 bg-outline-variant/30 mx-1"></div>
                <button
                    class="w-14 h-14 rounded-full bg-error text-white font-black text-xl flex items-center justify-center shadow-lg shadow-error/20 ring-4 ring-error-container">4</button>
                <div class="h-[1px] flex-1 bg-outline-variant/30 mx-1"></div>
                <button
                    class="w-10 h-10 rounded-full border border-outline text-outline font-bold flex items-center justify-center">5</button>
            </div>
        </section>
        <!-- Section 4: Location -->
        <section class="space-y-4">
            <label class="block text-sm font-bold tracking-wider uppercase text-on-surface-variant">Location</label>
            <div class="bg-[#F5F5F5] p-4 rounded-xl flex items-start gap-4">
                <span class="material-symbols-outlined text-[#1D9E75] mt-0.5"
                    style="font-variation-settings: 'FILL' 1;">location_on</span>
                <div class="flex-1">
                    <p class="text-sm font-medium text-stone-600 leading-relaxed" id="location-text">
                        Waiting for location...
                    </p>
                    <button id="btn-detect-location" class="text-[#1D9E75] text-sm font-bold mt-2 hover:underline flex items-center gap-1">
                        <span class="material-symbols-outlined text-[16px]">my_location</span> Detect Location
                    </button>
                </div>
                <div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 border border-white shadow-sm">
                    <img class="w-full h-full object-cover"
                        data-alt="abstract minimalist map topography with clean lines and soft green accents"
                        data-location="Solapur"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKs3Okh0tufUQsty_kFBN6jfgnj7XtImt867xNCYr50Zx8lMUymjjiZUHP-UFG6IBLD2yx36PnOTColXMLOpZzQPSqHwtVB9WJbvw3bJkzd4IZl70B7cUJGhDkA5QjxrpamWQutI2YOyq2WKQTjnpxSNRz7e5I0BD_E4F0U56B9qi9Rp9G_-uIe9d5o6dk0tefeCm5iXcxEfvrHmfUHy8qc5UlYrdYOcW-DSwV__D8V436Lrtbn1pDCpBLxAIN0zNJ4p4-TLr2drc" />
                </div>
            </div>
        </section>
    </main>
    <!-- Bottom CTA + Nav -->
    <div class="fixed bottom-0 left-0 w-full z-50">
        <!-- Submit button -->
        <div class="px-4 pt-3 bg-white/95 dark:bg-stone-900/95 backdrop-blur-md border-t border-stone-100 dark:border-stone-800">
            <button id="submit-report-btn"
                class="w-full py-4 rounded-2xl bg-[#1D9E75] text-white font-bold text-lg flex items-center justify-center gap-3 shadow-lg active:scale-[0.98] transition-all">
                <span class="material-symbols-outlined">send</span>
                Submit Report
            </button>
        </div>
        <!-- Nav bar -->
        <nav
            class="flex justify-around items-center pt-2 pb-6 px-4 bg-white/80 dark:bg-stone-900/80 backdrop-blur-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.04)]">
            <a href="home.html" data-nav="home.html"
                class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-1 hover:text-emerald-700 transition-all active:scale-95">
                <span class="material-symbols-outlined text-[22px]">home</span>
                <span class="text-[10px] font-bold uppercase tracking-widest mt-0.5" data-i18n="home">Home</span>
            </a>
            <a href="report.html" data-nav="report.html"
                class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-200 rounded-2xl px-5 py-1 transition-all active:scale-95">
                <span class="material-symbols-outlined text-[22px]"
                    style="font-variation-settings:'FILL' 1">add_circle</span>
                <span class="text-[10px] font-bold uppercase tracking-widest mt-0.5" data-i18n="report">Report</span>
            </a>
            <a href="tasks.html" data-nav="tasks.html"
                class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-1 hover:text-emerald-700 transition-all active:scale-95">
                <span class="material-symbols-outlined text-[22px]">assignment</span>
                <span class="text-[10px] font-bold uppercase tracking-widest mt-0.5" data-i18n="tasks">Tasks</span>
            </a>
            <a href="profile.html" data-nav="profile.html"
                class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-1 hover:text-emerald-700 transition-all active:scale-95">
                <span class="material-symbols-outlined text-[22px]">person</span>
                <span class="text-[10px] font-bold uppercase tracking-widest mt-0.5" data-i18n="profile">Profile</span>
            </a>
        </nav>
    </div>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/report.js"></script>
</body>

</html>
