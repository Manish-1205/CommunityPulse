<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | CommunityPulse</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "surface-variant": "#dee4de",
                        "secondary-container": "#7ab3ff",
                        "surface-container-high": "#e4eae4",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#00513a",
                        "on-primary-fixed": "#002115",
                        "surface-tint": "#006c4e",
                        "primary": "#00694c",
                        "tertiary-container": "#6e66d4",
                        "on-secondary-container": "#00447e",
                        "surface-container": "#eaefea",
                        "error-container": "#ffdad6",
                        "outline-variant": "#bccac1",
                        "primary-fixed": "#86f8c9",
                        "secondary": "#1960a6",
                        "error": "#ba1a1a",
                        "on-surface": "#171d1a",
                        "on-tertiary-fixed-variant": "#3f35a3",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#3d4943",
                        "surface": "#f5fbf5",
                        "inverse-on-surface": "#ecf2ed",
                        "secondary-fixed": "#d4e3ff",
                        "on-error": "#ffffff",
                        "inverse-primary": "#68dbae",
                        "background": "#f5fbf5",
                        "tertiary-fixed-dim": "#c5c0ff",
                        "tertiary-fixed": "#e3dfff",
                        "surface-dim": "#d6dbd6",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#dee4de",
                        "surface-container-low": "#eff5ef",
                        "primary-container": "#008560",
                        "on-background": "#171d1a",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-container": "#f5fff7",
                        "tertiary": "#554cb9",
                        "primary-fixed-dim": "#68dbae",
                        "secondary-fixed-dim": "#a4c9ff",
                        "surface-bright": "#f5fbf5",
                        "on-tertiary-fixed": "#140067",
                        "on-secondary-fixed-variant": "#004883",
                        "inverse-surface": "#2c322e",
                        "outline": "#6d7a73",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001c39"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-header {
            background: rgba(228, 234, 228, 0.7);
            backdrop-filter: blur(24px);
        }

        .bento-card {
            transition: all 0.2s ease-in-out;
        }

        .bento-card:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface-container-low text-on-surface min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header
        class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#eff5ef]/70 dark:bg-emerald-950/70 backdrop-blur-xl">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-2xl"
                style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
            <span class="font-headline font-black tracking-tight text-primary text-2xl">CommunityPulse</span>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center px-4 pt-24 pb-12">
        <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            <!-- Left Side: Visual/Context -->
            <div class="hidden md:flex md:col-span-5 flex-col gap-6 sticky top-24">
                <div class="relative rounded-full overflow-hidden aspect-[4/5] shadow-2xl">
                    <img class="w-full h-full object-cover"
                        data-alt="Humanitarian aid worker smiling warmly while helping a community in a bright outdoor setting with soft natural light"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUKF5j9WXPfaG-FTezcA-ui9V-Qu2DxQJdE47B2Jy8LebiLNd-R5QX6EJ-0XZuOMtoiQhJpu9ilv6iV1A8XXYQEKCcK7BBHoz0EuRn_cd4E54ES40E4Bp2ZDTVoJ66ak2slprfXAlXVZwnzNN5SS9LZGnxDl9naL1-o7P_iS0IIsoEsoyaAOigBbJOfEY_Omu7H5axvod7FdLrYv3FJlaAduidmtKssqt_UekG6nmiqPnESCDcJZsHpC2ltZy6exLgxtSzAiqpBxo" />
                    <div class="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent"></div>
                    <div class="absolute bottom-6 left-6 right-6 text-on-primary">
                        <p class="font-headline font-bold text-xl tracking-tight leading-tight">Together, we build
                            resilient futures.</p>
                        <p class="text-sm opacity-90 mt-2">Join thousands of coordinators and volunteers worldwide.</p>
                    </div>
                </div>
            </div>
            <!-- Right Side: Form -->
            <div
                class="md:col-span-7 bg-surface-container-lowest rounded-full p-8 md:p-12 shadow-[0_32px_64px_-12px_rgba(23,29,26,0.06)]">
                <header class="mb-10">
                    <h1
                        class="font-headline font-bold text-[2.75rem] tracking-tighter text-on-surface leading-none mb-4">
                        Create Account</h1>
                    <p class="font-body text-on-surface-variant text-lg leading-relaxed">Enter your details and select
                        your operational role to access the portal.</p>
                </header>
                <form class="space-y-8">
                    <!-- Identity Inputs -->
                    <div class="grid grid-cols-1 gap-6">
                        <div class="relative">
                            <label
                                class="block text-[0.75rem] font-bold uppercase tracking-widest text-on-surface-variant mb-2 px-1">Full
                                Name</label>
                            <div class="group relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
                                <input
                                    class="w-full h-14 pl-12 pr-4 bg-surface-variant border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline"
                                    placeholder="Jane Doe" type="text" />
                            </div>
                        </div>
                        <div class="relative">
                            <label
                                class="block text-[0.75rem] font-bold uppercase tracking-widest text-on-surface-variant mb-2 px-1">Email
                                Address</label>
                            <div class="group relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
                                <input
                                    class="w-full h-14 pl-12 pr-4 bg-surface-variant border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline"
                                    placeholder="jane.doe@organization.org" type="email" />
                            </div>
                        </div>
                        <div class="relative">
                            <label
                                class="block text-[0.75rem] font-bold uppercase tracking-widest text-on-surface-variant mb-2 px-1">Set
                                Password</label>
                            <div class="group relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
                                <input
                                    class="w-full h-14 pl-12 pr-4 bg-surface-variant border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline"
                                    placeholder="••••••••" type="password" />
                            </div>
                        </div>
                    </div>
                    <!-- Role Selection Section -->
                    <div class="pt-4">
                        <label
                            class="block text-[0.75rem] font-bold uppercase tracking-widest text-on-surface-variant mb-4 px-1">Primary
                            Operational Role</label>
                        <div class="grid grid-cols-1 gap-3">
                            <!-- Role Card 1 -->
                            <label class="relative cursor-pointer group">
                                <input checked="" class="peer sr-only" name="role" type="radio" />
                                <div
                                    class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low border-l-4 border-primary peer-checked:bg-primary-fixed transition-all">
                                    <div
                                        class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-full text-primary">
                                        <span class="material-symbols-outlined">terrain</span>
                                    </div>
                                    <div class="flex-grow">
                                        <p class="font-bold text-on-surface leading-tight">Field Operations</p>
                                        <p class="text-xs text-on-surface-variant">on-the-ground reporting</p>
                                    </div>
                                    <div
                                        class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:bg-primary peer-checked:border-primary transition-colors">
                                        <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100">
                                        </div>
                                    </div>
                                </div>
                            </label>
                            <!-- Role Card 2 -->
                            <label class="relative cursor-pointer group">
                                <input class="peer sr-only" name="role" type="radio" />
                                <div
                                    class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low border-l-4 border-secondary peer-checked:bg-secondary-fixed transition-all">
                                    <div
                                        class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-full text-secondary">
                                        <span class="material-symbols-outlined">hub</span>
                                    </div>
                                    <div class="flex-grow">
                                        <p class="font-bold text-on-surface leading-tight">NGO Coordination</p>
                                        <p class="text-xs text-on-surface-variant">logistics &amp; resource management
                                        </p>
                                    </div>
                                    <div
                                        class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:bg-secondary peer-checked:border-secondary transition-colors">
                                        <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100">
                                        </div>
                                    </div>
                                </div>
                            </label>
                            <!-- Role Card 3 -->
                            <label class="relative cursor-pointer group">
                                <input class="peer sr-only" name="role" type="radio" />
                                <div
                                    class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low border-l-4 border-tertiary peer-checked:bg-tertiary-fixed transition-all">
                                    <div
                                        class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-full text-tertiary">
                                        <span class="material-symbols-outlined">group</span>
                                    </div>
                                    <div class="flex-grow">
                                        <p class="font-bold text-on-surface leading-tight">Volunteer Hub</p>
                                        <p class="text-xs text-on-surface-variant">community support</p>
                                    </div>
                                    <div
                                        class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:bg-tertiary peer-checked:border-tertiary transition-colors">
                                        <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100">
                                        </div>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <!-- CTA Section -->
                    <div class="pt-6">
                        <button
                            class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-lg rounded-full shadow-[0_8px_24px_-4px_rgba(0,105,76,0.3)] active:scale-95 transition-transform"
                            type="button" onclick="window.location.href='home.html'">
                            Create Account
                        </button>
                        <p class="mt-6 text-center font-body text-on-surface-variant">
                            Already have an account?
                            <a class="text-primary font-bold hover:underline underline-offset-4 ml-1"
                                href="login.html">Log In here</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <!-- Footer Decorative Spacing -->
    <footer class="py-8 flex justify-center opacity-30">
        <div class="flex gap-4 items-center">
            <span class="h-[1px] w-12 bg-outline-variant"></span>
            <span class="material-symbols-outlined text-sm">emergency_share</span>
            <span class="h-[1px] w-12 bg-outline-variant"></span>
        </div>
    </footer>
</body>

</html>
